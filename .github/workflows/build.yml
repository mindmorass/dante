name: Build & Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to registry?"
        type: boolean
        default: false

# ── Repo-level variables (set in Settings → Variables) ──────────────────────
# PLATFORMS          linux/arm64               (default shown below)
# IMAGE_NAME         override image name       (default: repo name)
# DANTE_PORT         exposed port              (default: 1080)
# BASE_IMAGE         base Docker image         (default: debian:bookworm-slim)
# ────────────────────────────────────────────────────────────────────────────

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}
  PLATFORMS: ${{ vars.PLATFORMS || 'linux/arm64' }}
  BASE_IMAGE: ${{ vars.BASE_IMAGE || 'debian:bookworm-slim' }}
  DANTE_PORT: ${{ vars.DANTE_PORT || '1080' }}

jobs:
  build:
    name: Build ${{ matrix.platform || 'multi-arch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for provenance attestations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push  → branch name
            type=ref,event=branch
            # PR            → pr-<number>
            type=ref,event=pr
            # semver tag    → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # default branch → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # always tag with short SHA
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            DANTE_PORT=${{ env.DANTE_PORT }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          provenance: mode=max
          sbom: true

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}" | head -1
